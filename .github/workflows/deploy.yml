name: Build and Deploy Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Copy JAR and Dockerfile to remote server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "build/libs/suitcase-gateway-0.0.1-SNAPSHOT.jar,Dockerfile"
          target: "/root/suitcase-app/gateway"

      - name: Create Docker Network
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -euo pipefail
            docker network create suitcase-network || true

      - name: Build image and run container on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/suitcase-app/gateway

            docker stop suitcase-gateway-container || true
            docker rm suitcase-gateway-container || true

            docker build -t suitcase-gateway .

            docker run -d -p 443:443 -e SERVER_SSL_KEY_ALIAS=1 \
              --name suitcase-gateway-container \
              --network suitcase-network \
              suitcase-gateway

      - name: Verify container and TLS on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -euo pipefail
            docker ps --filter name=suitcase-gateway-container --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo | openssl s_client -connect 127.0.0.1:443 -servername www.bikeboxgo.ru 2>/dev/null \
              | openssl x509 -noout -subject -dates
