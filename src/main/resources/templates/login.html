<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Вход — BikeBoxGo</title>
    <style>
        :root {
            --primary: #FFCC00;
            --dark: #111;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #f5f5f6 0%, #e8eaed 100%);
            color: var(--dark);
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            padding: 32px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.35rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 24px; }
        .err {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.35);
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            background: var(--dark);
            color: var(--primary);
            cursor: pointer;
        }
        button[type="submit"]:hover { filter: brightness(1.08); }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: var(--muted); font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h1>BikeBoxGo</h1>
    <p class="sub">Доступ к админ-разделам</p>

    <div class="err" th:if="${param.error}">
        Неверный пароль. Попробуйте снова.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" name="username" value="admin"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" autofocus/>
        <button type="submit">Войти</button>
    </form>

    <p class="back"><a href="/">← На главную</a></p>
</div>
</body>
</html>
