<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Вход — BikeBoxGo</title>
    <style>
        :root { --primary: #FFCC00; --dark: #111; --muted: #6b7280; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #f5f5f6 0%, #e8eaed 100%);
            color: var(--dark);
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            padding: 32px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.35rem; margin-bottom: 8px; text-align: center; }
        .sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        button[type="submit"]:hover { filter: brightness(1.05); }
        .err {
            background: #fef2f2;
            color: #b91c1c;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Вход</h1>
    <p class="sub">Заказы и график — только для администратора</p>
    <form method="post" action="/login">
        <input type="hidden" name="username" value="admin" autocomplete="username"/>
        <label for="password">Пароль</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required autofocus/>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>
