<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Заказы — BikeBoxGo</title>
    <style>
        :root {
            --primary-color: #FFCC00;
            --secondary-color: #000000;
            --light-bg: #eef0f2;
            --surface: #ffffff;
            --border-radius: 10px;
            --success: #00B956;
            --danger: #FF3333;
            --muted: #6b7280;
            --pad-x: clamp(12px, 3vw, 32px);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light-bg);
            color: var(--secondary-color);
            line-height: 1.5;
            min-height: 100vh;
        }
        .topbar {
            background: linear-gradient(180deg, var(--primary-color) 0%, #f5d54a 100%);
            padding: 14px var(--pad-x);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .topbar h1 { font-size: clamp(1.1rem, 2.5vw, 1.35rem); font-weight: 800; letter-spacing: -0.02em; }
        .topbar-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .logout-form { display: inline; margin: 0; }
        .btn-logout {
            background: rgba(255,255,255,0.4);
            color: var(--secondary-color);
            border: 1px solid rgba(0,0,0,0.15);
            padding: 10px 16px;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 14px;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.65); }
        a.home-link {
            color: var(--secondary-color);
            font-weight: 600;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: var(--border-radius);
            background: rgba(255,255,255,0.35);
        }
        a.home-link:hover { background: rgba(255,255,255,0.55); }
        button {
            cursor: pointer;
            border: none;
            border-radius: var(--border-radius);
            padding: 10px 18px;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        button:hover:not(:disabled) { transform: translateY(-1px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-refresh {
            background: var(--secondary-color);
            color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-confirm { background: var(--success); color: #fff; font-size: 13px; padding: 8px 14px; }
        .btn-cancel { background: var(--danger); color: #fff; font-size: 13px; padding: 8px 14px; }

        .toolbar {
            width: 100%;
            padding: 16px var(--pad-x) 0;
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: flex-start;
            gap: 14px;
        }
        .filter-block {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .filter-block label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            user-select: none;
        }
        .filter-block input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--secondary-color);
            cursor: pointer;
        }
        .sort-block {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .sort-block label { font-weight: 600; font-size: 14px; color: #374151; }
        .sort-block select {
            min-width: 280px;
            max-width: 100%;
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .sort-block select { min-width: 0; width: 100%; }
        }
        .count-badge {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }
        .count-badge strong { color: var(--secondary-color); }

        .main-inner {
            width: 100%;
            max-width: 100%;
            padding: 16px var(--pad-x) 32px;
        }
        .status-line { font-size: 14px; color: var(--muted); margin-bottom: 12px; min-height: 1.4em; }
        .status-line.error { color: var(--danger); font-weight: 500; }
        .loading { padding: 56px 24px; text-align: center; color: var(--muted); font-size: 15px; }

        /* Desktop table */
        .orders-desktop {
            display: block;
            width: 100%;
            background: var(--surface);
            border-radius: var(--border-radius);
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }
        table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #ececec;
        }
        th {
            background: #f8f9fa;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #374151;
            white-space: nowrap;
        }
        tbody tr:hover { background: #fafafa; }
        tr:last-child td { border-bottom: none; }
        .mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; word-break: break-all; }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }
        .st-PENDING { background: #fff3cd; color: #856404; }
        .st-IN_USE { background: #cce5ff; color: #004085; }
        .st-CONFIRMED { background: #d4edda; color: #155724; }
        .st-CANCELLED { background: #e9ecef; color: #555; }
        .st-COMPLETED { background: #dee2e6; color: #333; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .empty {
            padding: 56px 24px;
            text-align: center;
            color: var(--muted);
            font-size: 15px;
            background: var(--surface);
            border-radius: var(--border-radius);
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }

        /* Mobile cards */
        .orders-mobile { display: none; width: 100%; gap: 12px; flex-direction: column; }
        .order-card {
            background: var(--surface);
            border-radius: var(--border-radius);
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .order-card-row {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 8px 12px;
            font-size: 14px;
            margin-bottom: 8px;
            align-items: start;
        }
        .order-card-row span:first-child { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
        .order-card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #eee;
        }
        .order-card-actions button { flex: 1; min-width: 120px; }

        @media (max-width: 900px) {
            .orders-desktop { display: none; }
            .orders-mobile { display: flex; }
            table { min-width: 0; }
        }
        @media (min-width: 901px) {
            .orders-mobile { display: none !important; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <h1>Управление заказами</h1>
    <div class="topbar-actions">
        <a class="home-link" href="/">← На главную</a>
        <button type="button" class="btn-refresh" id="refreshBtn">Обновить</button>
        <form class="logout-form" action="/logout" method="post">
            <button type="submit" class="btn-logout">Выйти</button>
        </form>
    </div>
</header>

<div class="toolbar">
    <div class="filter-block">
        <label>
            <input type="checkbox" id="filterPendingOnly">
            <span>Только «Ожидает» (PENDING)</span>
        </label>
        <span class="count-badge" id="countBadge"></span>
    </div>
    <div class="sort-block">
        <label for="sortSelect">Сортировка</label>
        <select id="sortSelect" aria-label="Сортировка списка заказов">
            <option value="startDate:desc">Дата начала (сначала поздние)</option>
            <option value="startDate:asc">Дата начала (сначала ранние)</option>
            <option value="fullName:asc">ФИО (А → Я)</option>
            <option value="fullName:desc">ФИО (Я → А)</option>
            <option value="status:asc">Статус (по этапу: ожидание → завершён)</option>
            <option value="status:desc">Статус (обратный порядок)</option>
        </select>
    </div>
</div>

<main class="main-inner">
    <p class="status-line" id="statusLine"></p>
    <div id="contentArea" class="loading">Загрузка…</div>
</main>

<script>
(function () {
    const statusLine = document.getElementById('statusLine');
    const contentArea = document.getElementById('contentArea');
    const refreshBtn = document.getElementById('refreshBtn');
    const filterPendingOnly = document.getElementById('filterPendingOnly');
    const countBadge = document.getElementById('countBadge');
    const sortSelect = document.getElementById('sortSelect');

    let allOrders = [];

    /** Порядок статусов для сортировки «по этапу» */
    var STATUS_SORT_ORDER = { PENDING: 0, IN_USE: 1, CONFIRMED: 2, COMPLETED: 3, CANCELLED: 4 };

    const statusLabels = {
        PENDING: 'Ожидает',
        IN_USE: 'В использовании',
        CONFIRMED: 'Подтверждён',
        CANCELLED: 'Отменён',
        COMPLETED: 'Завершён'
    };

    function statusLabel(s) {
        return statusLabels[s] || s;
    }

    function setStatus(msg, isError) {
        statusLine.textContent = msg || '';
        statusLine.classList.toggle('error', !!isError);
    }

    function canConfirm(status) {
        return status === 'PENDING';
    }

    function canCancel(status) {
        return status !== 'CANCELLED' && status !== 'COMPLETED';
    }

    function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function getFilteredRows() {
        if (!filterPendingOnly.checked) return allOrders.slice();
        return allOrders.filter(function (r) { return r.status === 'PENDING'; });
    }

    function sortRows(rows) {
        var parts = (sortSelect.value || 'startDate:desc').split(':');
        var key = parts[0];
        var dirMul = parts[1] === 'asc' ? 1 : -1;
        var copy = rows.slice();
        copy.sort(function (a, b) {
            var cmp = 0;
            if (key === 'startDate') {
                var sa = a.startDate || '';
                var sb = b.startDate || '';
                cmp = sa < sb ? -1 : (sa > sb ? 1 : 0);
            } else if (key === 'fullName') {
                var fa = (a.fullName || '').trim().toLowerCase();
                var fb = (b.fullName || '').trim().toLowerCase();
                if (!fa && !fb) cmp = 0;
                else if (!fa) cmp = 1;
                else if (!fb) cmp = -1;
                else cmp = fa.localeCompare(fb, 'ru');
            } else if (key === 'status') {
                var oa = STATUS_SORT_ORDER.hasOwnProperty(a.status) ? STATUS_SORT_ORDER[a.status] : 99;
                var ob = STATUS_SORT_ORDER.hasOwnProperty(b.status) ? STATUS_SORT_ORDER[b.status] : 99;
                cmp = oa - ob;
                if (cmp === 0) cmp = String(a.status || '').localeCompare(String(b.status || ''));
            }
            return dirMul * cmp;
        });
        return copy;
    }

    function updateCountBadge(shown, total) {
        if (!total && !allOrders.length) {
            countBadge.innerHTML = '';
            return;
        }
        countBadge.innerHTML = filterPendingOnly.checked
            ? 'Показано: <strong>' + shown + '</strong> из ' + total + ' (только ожидают)'
            : 'Всего заказов: <strong>' + total + '</strong>';
    }

    function renderTable(rows) {
        const total = allOrders.length;
        updateCountBadge(rows.length, total);

        if (!rows.length) {
            var msg = filterPendingOnly.checked && total > 0
                ? 'Нет заказов в статусе «Ожидает»'
                : 'Нет заказов';
            contentArea.innerHTML = '<div class="empty">' + msg + '</div>';
            return;
        }

        function cellText(val) {
            if (val == null || val === '') return '—';
            return escapeHtml(val);
        }

        function rowDesktop(r) {
            var id = r.id;
            var badgeClass = 'status-badge st-' + (r.status || '').replace(/[^A-Z_]/g, '_');
            var cDisabled = canConfirm(r.status) ? '' : 'disabled';
            var xDisabled = canCancel(r.status) ? '' : 'disabled';
            return '<tr data-id="' + escapeHtml(id) + '">' +
                '<td class="mono">' + escapeHtml(id) + '</td>' +
                '<td class="mono">' + (r.suitcaseId ? escapeHtml(r.suitcaseId) : '—') + '</td>' +
                '<td>' + cellText(r.fullName) + '</td>' +
                '<td class="mono">' + cellText(r.phone) + '</td>' +
                '<td>' + escapeHtml(r.startDate || '—') + '</td>' +
                '<td>' + escapeHtml(r.endDate || '—') + '</td>' +
                '<td><span class="' + badgeClass + '">' + escapeHtml(statusLabel(r.status)) + '</span><br><small class="mono">' + escapeHtml(r.status || '') + '</small></td>' +
                '<td class="actions">' +
                '<button type="button" class="btn-confirm" data-action="confirm" data-id="' + escapeHtml(id) + '" ' + cDisabled + '>Подтвердить</button>' +
                '<button type="button" class="btn-cancel" data-action="cancel" data-id="' + escapeHtml(id) + '" ' + xDisabled + '>Отменить</button>' +
                '</td></tr>';
        }

        function rowMobile(r) {
            var id = r.id;
            var badgeClass = 'status-badge st-' + (r.status || '').replace(/[^A-Z_]/g, '_');
            var cDisabled = canConfirm(r.status) ? '' : 'disabled';
            var xDisabled = canCancel(r.status) ? '' : 'disabled';
            return '<article class="order-card" data-id="' + escapeHtml(id) + '">' +
                '<div class="order-card-header">' +
                '<span class="' + badgeClass + '">' + escapeHtml(statusLabel(r.status)) + '</span>' +
                '</div>' +
                '<div class="order-card-row"><span>Бронь</span><span class="mono">' + escapeHtml(id) + '</span></div>' +
                '<div class="order-card-row"><span>Чемодан</span><span class="mono">' + escapeHtml(r.suitcaseId || '—') + '</span></div>' +
                '<div class="order-card-row"><span>ФИО</span><span>' + cellText(r.fullName) + '</span></div>' +
                '<div class="order-card-row"><span>Телефон</span><span class="mono">' + cellText(r.phone) + '</span></div>' +
                '<div class="order-card-row"><span>Период</span><span>' + escapeHtml(r.startDate || '—') + ' — ' + escapeHtml(r.endDate || '—') + '</span></div>' +
                '<div class="order-card-row"><span>Статус API</span><span class="mono">' + escapeHtml(r.status || '') + '</span></div>' +
                '<div class="order-card-actions">' +
                '<button type="button" class="btn-confirm" data-action="confirm" data-id="' + escapeHtml(id) + '" ' + cDisabled + '>Подтвердить</button>' +
                '<button type="button" class="btn-cancel" data-action="cancel" data-id="' + escapeHtml(id) + '" ' + xDisabled + '>Отменить</button>' +
                '</div></article>';
        }

        var thead = '<tr><th>ID брони</th><th>Чемодан</th><th>ФИО</th><th>Телефон</th><th>Начало</th><th>Окончание</th><th>Статус</th><th>Действия</th></tr>';
        var desktopBody = rows.map(rowDesktop).join('');
        var mobileBody = rows.map(rowMobile).join('');

        contentArea.innerHTML =
            '<div class="orders-desktop"><div class="table-scroll"><table><thead>' + thead + '</thead><tbody>' +
            desktopBody + '</tbody></table></div></div>' +
            '<div class="orders-mobile">' + mobileBody + '</div>';

        contentArea.querySelectorAll('button[data-action]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var action = btn.getAttribute('data-action');
                var bid = btn.getAttribute('data-id');
                if (action === 'confirm') postAction(bid, 'confirm');
                if (action === 'cancel') postAction(bid, 'cancel');
            });
        });
    }

    function applyFilterAndRender() {
        renderTable(sortRows(getFilteredRows()));
    }

    function loadOrders() {
        setStatus('');
        contentArea.innerHTML = '<div class="loading">Загрузка…</div>';
        refreshBtn.disabled = true;

        fetch('/booking')
            .then(function (res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function (data) {
                if (!Array.isArray(data)) throw new Error('Ожидался массив');
                allOrders = data;
                applyFilterAndRender();
            })
            .catch(function (e) {
                setStatus('Не удалось загрузить заказы: ' + e.message, true);
                allOrders = [];
                contentArea.innerHTML = '<div class="empty">Ошибка загрузки</div>';
                updateCountBadge(0, 0);
            })
            .finally(function () {
                refreshBtn.disabled = false;
            });
    }

    function postAction(id, kind) {
        setStatus('Выполняется…');
        var url = '/booking/' + id + '/' + (kind === 'confirm' ? 'confirm' : 'cancel');

        fetch(url, { method: 'POST' })
            .then(function (res) {
                if (res.status === 404) throw new Error('Заказ не найден');
                if (res.status === 409) throw new Error(kind === 'confirm'
                    ? 'Нельзя подтвердить в этом статусе'
                    : 'Нельзя отменить (например, уже завершён)');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.text();
            })
            .then(function (body) {
                setStatus('Готово. Ответ: ' + (body || 'OK').trim());
                loadOrders();
            })
            .catch(function (e) {
                setStatus(e.message || 'Ошибка', true);
            });
    }

    refreshBtn.addEventListener('click', loadOrders);
    filterPendingOnly.addEventListener('change', applyFilterAndRender);
    sortSelect.addEventListener('change', applyFilterAndRender);
    loadOrders();
})();
</script>
</body>
</html>
